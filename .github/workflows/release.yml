name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create (e.g. v0.5.0)"
        required: true
      target:
        description: "Commit SHA or branch to tag"
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes=".github/release-notes/${{ inputs.tag }}.md"
          if [ ! -f "$notes" ]; then
            echo "missing $notes" >&2
            exit 1
          fi
          gh release create "${{ inputs.tag }}" \
            --target "${{ inputs.target }}" \
            --title "tooey ${{ inputs.tag }}" \
            --notes-file "$notes"
